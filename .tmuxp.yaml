session_name: Obsidian-Ops
windows:
  - window_name: Obsidian-Ops
    layout: main-vertical
    options:
      main-pane-width: 20%
    panes:
      - shell_command:
          - cd ~/Documents/Notes/Projects/obsidian-ops
          # - nvim Notes.md ToDo.md
          - open-project
      - shell_command:
          - tmux resizep -y 85%
          - filelist-open "startup_files.txt" obsidian-ops
        focus: true
      - clear
